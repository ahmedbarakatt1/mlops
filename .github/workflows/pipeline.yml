# .github/workflows/pipeline.yml
name: MLOps End-to-End Pipeline

on:
  push:
    branches:
      - main
      - '*' # Allow all branches to trigger, so the if condition actually skips properly instead of not running at all on non-main branches

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Linter
        run: pip install flake8
      - name: Run Linter
        run: flake8 src/

  train:
    needs: linter
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup DVC
        uses: iterative/setup-dvc@v1

      - name: Pull Data
        run: dvc pull

      - name: Train
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python src/train.py

      - name: Create Error Log File
        if: failure()
        run: echo "Detailed training error log" > error_logs.txt

      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error_logs
          path: error_logs.txt

      - name: Persist
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Clean up temporary volumes
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

  deploy:
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install MLflow functionality
        run: pip install -r requirements.txt

      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Logic
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      - name: Containerize
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          docker build --build-arg RUN_ID=$RUN_ID -t my-ml-app:$RUN_ID .